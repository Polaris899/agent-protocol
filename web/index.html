<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Protocol — 发现 AI Skills</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #22263a;
      --border: #2a2e42;
      --text: #e2e4eb;
      --text-muted: #8a8fa8;
      --accent: #6c5ce7;
      --accent-glow: rgba(108, 92, 231, 0.25);
      --green: #48bb78;
      --yellow: #ecc94b;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
    }
    header {
      padding: 48px 0 32px;
      text-align: center;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      color: var(--text-muted);
      margin-top: 8px;
      font-size: 1rem;
    }
    .search-box {
      max-width: 640px;
      margin: 0 auto 48px;
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 16px 20px;
      padding-right: 52px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1.05rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .search-box input::placeholder {
      color: var(--text-muted);
    }
    .search-box .search-icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1.2rem;
      pointer-events: none;
    }
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 32px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .stats-bar span {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stats-bar .num {
      color: var(--text);
      font-weight: 600;
    }
    .results {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 200px;
    }
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      transition: border-color 0.2s, transform 0.15s;
      cursor: pointer;
    }
    .result-card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    .result-card .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .result-card .name {
      font-size: 1.1rem;
      font-weight: 600;
    }
    .result-card .name small {
      font-weight: 400;
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-left: 8px;
    }
    .result-card .badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge.audited { background: rgba(72, 187, 120, 0.15); color: var(--green); }
    .badge.unaudited { background: rgba(238, 73, 73, 0.12); color: #e53e3e; }
    .badge.free { background: rgba(108, 92, 231, 0.12); color: #a29bfe; }
    .result-card .desc {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .result-card .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 10px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .result-card .meta .cap-count {
      color: var(--accent);
    }
    .result-card .install-cmd {
      margin-top: 10px;
      background: var(--surface-2);
      border-radius: 6px;
      padding: 6px 12px;
      font-family: 'JetBrains Mono', 'Cascadia Code', monospace;
      font-size: 0.8rem;
      color: var(--accent);
      display: inline-block;
    }
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
    .empty-state h3 { color: var(--text); margin-bottom: 8px; }
    .loading {
      text-align: center;
      padding: 48px;
      color: var(--text-muted);
    }
    .loading .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    footer {
      text-align: center;
      padding: 48px 0;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    .error-state {
      text-align: center;
      padding: 48px 24px;
      color: #e53e3e;
    }
  </style>
</head>
<body>
  <header class="container">
    <h1>⚡ Agent Protocol</h1>
    <p>AI 能力路由注册中心 — 发现、搜索、安装任意 Skill</p>
  </header>

  <main class="container">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索 Skill，如"天气"、"分析财报"、"翻译"..." autofocus>
      <span class="search-icon">⌕</span>
    </div>

    <div class="stats-bar" id="statsBar">
      <span>📦 <span class="num" id="totalSkills">-</span> Skills</span>
      <span>🎯 <span class="num" id="totalCaps">-</span> 能力</span>
      <span>🏷 <span class="num" id="totalTags">-</span> 标签</span>
    </div>

    <div class="results" id="results">
      <div class="loading">
        <div class="spinner"></div>
        <p>加载索引中...</p>
      </div>
    </div>
  </main>

  <footer class="container">
    <p>
      <a href="https://github.com/agent-protocol/spec" target="_blank">📖 协议规范</a>
      &nbsp;·&nbsp;
      <code>agent install openclaw/weather-skill</code>
      &nbsp;·&nbsp;
      <a href="#" onclick="loadAll()">浏览全部</a>
    </p>
  </footer>

  <script>
    const API_BASE = 'http://localhost:3456';
    let allResults = [];

    // Load stats on startup
    async function loadStats() {
      try {
        const res = await fetch(`${API_BASE}/stats`);
        const stats = await res.json();
        document.getElementById('totalSkills').textContent = stats.total_manifests || 0;
        document.getElementById('totalCaps').textContent = stats.total_capabilities || 0;
        document.getElementById('totalTags').textContent = stats.unique_tags || 0;
      } catch {
        document.getElementById('totalSkills').textContent = '离线';
        document.getElementById('totalCaps').textContent = '-';
        document.getElementById('totalTags').textContent = '-';
      }
    }

    // Search function
    async function doSearch(query) {
      const resultsEl = document.getElementById('results');

      if (!query) {
        loadAll();
        return;
      }

      resultsEl.innerHTML = `<div class="loading"><div class="spinner"></div><p>搜索中...</p></div>`;

      try {
        const res = await fetch(`${API_BASE}/search?q=${encodeURIComponent(query)}&limit=20&format=pretty`);
        if (!res.ok) throw new Error('API 错误');
        const data = await res.json();
        renderResults(data.results || [], query);
      } catch {
        // Fallback: local search
        const results = localSearch(query);
        renderResults(results, query);
      }
    }

    function localSearch(query) {
      const keywords = query.toLowerCase().split(/\s+/).filter(Boolean);
      if (!keywords.length) return allResults;

      const scored = allResults.map(m => {
        let score = 0;
        const text = [
          m.name, m.description, m.id,
          ...(m.tags || []),
          ...(m.capabilities || []).map(c => c.name + ' ' + (c.description || '') + ' ' + (c.intents || []).join(' '))
        ].join(' ').toLowerCase();

        for (const kw of keywords) {
          if (text.includes(kw)) {
            score += (text.match(new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g')) || []).length;
          }
        }
        if (m.name && m.name.toLowerCase().includes(keywords[0])) score += 5;
        return { manifest: m, score };
      });

      return scored.filter(s => s.score > 0).sort((a, b) => b.score - a.score).slice(0, 20).map(s => s.manifest);
    }

    function renderResults(results, query) {
      const resultsEl = document.getElementById('results');

      if (!results || results.length === 0) {
        resultsEl.innerHTML = `
          <div class="empty-state">
            <div class="icon">🔍</div>
            <h3>未找到匹配的 Skill</h3>
            <p>试试其他关键词，或 <a href="#" onclick="loadAll()">浏览全部</a></p>
          </div>
        `;
        return;
      }

      resultsEl.innerHTML = results.map(m => {
        const capCount = (m.capabilities || []).length;
        const isAudited = m.trust?.verified_by?.length > 0;
        const repo = m._repo || m.id?.replace(/\./g, '/') || 'unknown';
        const desc = m.description || '暂无描述';
        const badges = [];
        if (isAudited) badges.push('<span class="badge audited">✓ 已审计</span>');
        else badges.push('<span class="badge unaudited">未审计</span>');
        if ((m.capabilities || []).every(c => !c.cost_per_call)) badges.push('<span class="badge free">免费</span>');

        return `
          <div class="result-card" onclick="showDetail('${m.id}')">
            <div class="top">
              <div>
                <div class="name">${m.name} <small>v${m.version}</small></div>
              </div>
              <div>${badges.join('')}</div>
            </div>
            <div class="desc">${desc}</div>
            <div class="meta">
              <span class="cap-count">🎯 ${capCount} 个能力</span>
              <span>👤 ${m.author?.name || repo.split('/')[0]}</span>
              ${m.runtime ? `<span>⚙ ${m.runtime.engine}</span>` : ''}
              ${m.tags?.length ? `<span>🏷 ${m.tags.slice(0, 3).join(', ')}</span>` : ''}
            </div>
            <span class="install-cmd">agent install ${repo}</span>
          </div>
        `;
      }).join('');
    }

    function showDetail(id) {
      const m = allResults.find(x => x.id === id);
      if (!m) return;
      const resultsEl = document.getElementById('results');
      const repo = m._repo || m.id?.replace(/\./g, '/') || 'unknown';
      const caps = m.capabilities || [];

      resultsEl.innerHTML = `
        <div style="margin-bottom:12px">
          <a href="#" onclick="loadAll()" style="color:var(--accent);text-decoration:none">← 返回搜索结果</a>
        </div>
        <div class="result-card" style="cursor:default">
          <div class="top">
            <div>
              <div class="name" style="font-size:1.3rem">${m.name}</div>
              <div style="color:var(--text-muted);font-size:0.85rem;margin-top:4px">${m.id} · v${m.version}</div>
            </div>
          </div>
          <div style="margin-top:12px;color:var(--text)">${m.description || '暂无描述'}</div>
          <div style="margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:0.85rem">
            <div>👤 作者: ${m.author?.name || '未知'}</div>
            <div>📄 许可: ${m.license || '未声明'}</div>
            <div>⚙ 引擎: ${m.runtime?.engine || '未指定'}</div>
            <div>🔒 沙箱: ${m.trust?.sandbox_level || 'basic'}</div>
          </div>
          <div style="margin-top:16px">
            <div class="install-cmd">agent install ${repo}</div>
          </div>
          <hr style="border-color:var(--border);margin:16px 0">
          <div style="font-weight:600;margin-bottom:8px">🎯 能力 (${caps.length})</div>
          ${caps.map(c => `
            <div style="background:var(--surface-2);border-radius:8px;padding:12px;margin-bottom:8px">
              <div style="font-weight:500">${c.name}</div>
              <div style="color:var(--text-muted);font-size:0.85rem;margin-top:4px">${c.description}</div>
              ${c.intents?.length ? `<div style="color:var(--text-muted);font-size:0.8rem;margin-top:6px">📝 意图示例: ${c.intents.slice(0,3).join(' · ')}</div>` : ''}
            </div>
          `).join('')}
          ${m.trust?.permissions?.length ? `
            <hr style="border-color:var(--border);margin:16px 0">
            <div style="font-weight:600;margin-bottom:8px">🔒 权限声明</div>
            <div style="display:flex;flex-wrap:wrap;gap:6px">
              ${m.trust.permissions.map(p => `<span style="background:var(--surface-2);border-radius:4px;padding:2px 8px;font-size:0.8rem;color:var(--yellow)">${p}</span>`).join('')}
            </div>
          ` : ''}
        </div>
      `;
    }

    async function loadAll() {
      const resultsEl = document.getElementById('results');
      resultsEl.innerHTML = `<div class="loading"><div class="spinner"></div><p>加载中...</p></div>`;

      try {
        const res = await fetch(`${API_BASE}/search?q=&limit=20`);
        if (res.ok) {
          const data = await res.json();
          allResults = data.results || [];
          renderResults(allResults, '');
          return;
        }
      } catch {}

      // If API not available, try loading pre-seeded data
      try {
        const res2 = await fetch('./data/index.json');
        if (res2.ok) {
          allResults = await res2.json();
        }
      } catch {}
      renderResults(allResults, '');
    }

    // Search input handler
    let searchTimer;
    document.getElementById('searchInput').addEventListener('input', (e) => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => doSearch(e.target.value.trim()), 300);
    });

    // Init
    loadStats();
    loadAll();
  </script>
</body>
</html>
