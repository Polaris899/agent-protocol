<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMP Registry v1.0 — Discover AI Skills</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #22263a;
      --border: #2a2e42;
      --text: #e2e4eb;
      --text-muted: #8a8fa8;
      --accent: #6c5ce7;
      --accent-glow: rgba(108, 92, 231, 0.25);
      --green: #48bb78;
      --yellow: #ecc94b;
      --red: #e53e3e;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }
    header { padding: 48px 0 32px; text-align: center; }
    header h1 {
      font-size: 2rem; font-weight: 700;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p { color: var(--text-muted); margin-top: 8px; font-size: 1rem; }
    .search-box {
      max-width: 640px; margin: 0 auto 48px; position: relative;
    }
    .search-box input {
      width: 100%; padding: 16px 20px; padding-right: 52px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 1.05rem;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-box input:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .search-box input::placeholder { color: var(--text-muted); }
    .search-icon {
      position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 1.2rem; pointer-events: none;
    }
    .stats-bar {
      display: flex; justify-content: center; gap: 32px; margin-bottom: 32px;
      font-size: 0.9rem; color: var(--text-muted);
    }
    .stats-bar span { display: flex; align-items: center; gap: 6px; }
    .stats-bar .num { color: var(--text); font-weight: 600; }
    .results { display: flex; flex-direction: column; gap: 12px; min-height: 200px; }
    .result-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 24px;
      transition: border-color 0.2s, transform 0.15s; cursor: pointer;
    }
    .result-card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .result-card .top {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    }
    .result-card .name { font-size: 1.1rem; font-weight: 600; }
    .result-card .name small {
      font-weight: 400; color: var(--text-muted); font-size: 0.8rem; margin-left: 8px;
    }
    .badge {
      font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    }
    .badge.audited { background: rgba(72, 187, 120, 0.15); color: var(--green); }
    .badge.unaudited { background: rgba(238, 73, 73, 0.12); color: var(--red); }
    .badge.free { background: rgba(108, 92, 231, 0.12); color: #a29bfe; }
    .result-card .desc {
      color: var(--text-muted); font-size: 0.9rem; margin-top: 6px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .result-card .meta {
      display: flex; flex-wrap: wrap; gap: 16px; margin-top: 10px; font-size: 0.8rem; color: var(--text-muted);
    }
    .result-card .meta .cap-count { color: var(--accent); }
    .result-card .install-cmd {
      margin-top: 10px; background: var(--surface-2); border-radius: 6px;
      padding: 6px 12px; font-family: 'JetBrains Mono', 'Cascadia Code', monospace;
      font-size: 0.8rem; color: var(--accent); display: inline-block;
    }
    .empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }
    .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
    .empty-state h3 { color: var(--text); margin-bottom: 8px; }
    .empty-state a { color: var(--accent); }
    .loading { text-align: center; padding: 48px; color: var(--text-muted); }
    .loading .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    footer { text-align: center; padding: 48px 0; color: var(--text-muted); font-size: 0.85rem; }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    footer code { background: var(--surface-2); padding: 2px 6px; border-radius: 4px; }
    .detail-header { margin-bottom: 12px; }
    .detail-header a { color: var(--accent); text-decoration: none; }
    .detail-header a:hover { text-decoration: underline; }
    .detail-card { cursor: default; }
    .detail-card h2 { font-size: 1.3rem; }
    .detail-card .subtitle { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }
    .detail-card .desc-text { margin-top: 12px; color: var(--text); }
    .detail-grid {
      margin-top: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.85rem;
    }
    .detail-cap {
      background: var(--surface-2); border-radius: 8px; padding: 12px; margin-bottom: 8px;
    }
    .detail-cap-title { font-weight: 500; }
    .detail-cap-desc { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }
    .detail-cap-intents { color: var(--text-muted); font-size: 0.8rem; margin-top: 6px; }
    .perm-badge {
      background: var(--surface-2); border-radius: 4px;
      padding: 2px 8px; font-size: 0.8rem; color: var(--yellow);
    }
    .section-title {
      font-weight: 600; margin-bottom: 8px; margin-top: 16px;
    }
    hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag-item {
      background: var(--surface-2); padding: 2px 10px; border-radius: 20px;
      font-size: 0.75rem; cursor: pointer; transition: background 0.15s;
    }
    .tag-item:hover { background: var(--accent); color: white; }
    @media (max-width: 600px) {
      .detail-grid { grid-template-columns: 1fr; }
      .stats-bar { gap: 16px; flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <header class="container">
    <h1>⚡ AMP Registry v1.0</h1>
    <p>AI 能力路由注册中心 — 纯客户端搜索，无需后端</p>
  </header>

  <main class="container">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索 Skill，如"天气"、"分析财报"、"translate"..." autofocus>
      <span class="search-icon">⌕</span>
    </div>

    <div class="stats-bar" id="statsBar">
      <span>📦 <span class="num" id="totalSkills">-</span> Skills</span>
      <span>🎯 <span class="num" id="totalCaps">-</span> 能力</span>
      <span>🏷 <span class="num" id="totalTags">-</span> 标签</span>
    </div>

    <div class="results" id="results">
      <div class="loading">
        <div class="spinner"></div>
        <p>加载索引中...</p>
      </div>
    </div>
  </main>

  <footer class="container">
    <p>
      <a href="https://github.com/Polaris899/agent-protocol" target="_blank">📖 GitHub</a>
      &nbsp;·&nbsp;
      <code>agent install user/repo</code>
      &nbsp;·&nbsp;
      <a href="#" id="browseAllLink">浏览全部</a>
      &nbsp;·&nbsp;
      <a href="https://github.com/Polaris899/agent-protocol/discussions/1" target="_blank">💬 招募开发者</a>
    </p>
  </footer>

  <script src="index-data.js"></script>
  <script>
    (function() {
      const index = AGENT_INDEX || [];
      let showingDetail = null;

      function computeStats() {
        const totalSkills = index.length;
        const totalCaps = index.reduce((s, m) => s + (m.capabilities?.length || 0), 0);
        const tags = new Set();
        index.forEach(m => (m.tags || []).forEach(t => tags.add(t)));
        return { totalSkills, totalCaps, totalTags: tags.size };
      }

      function renderStats() {
        const stats = computeStats();
        document.getElementById('totalSkills').textContent = stats.totalSkills;
        document.getElementById('totalCaps').textContent = stats.totalCaps;
        document.getElementById('totalTags').textContent = stats.totalTags;
      }

      function localSearch(query) {
        const keywords = query.toLowerCase().split(/\s+/).filter(Boolean);
        if (!keywords.length) return index;

        const scored = index.map(m => {
          let score = 0;
          const text = [
            m.name, m.description, m.id,
            ...(m.tags || []),
            ...(m.capabilities || []).map(c => c.name + ' ' + (c.description || '') + ' ' + (c.intents || []).join(' '))
          ].join(' ').toLowerCase();

          for (const kw of keywords) {
            const escaped = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const re = new RegExp(escaped, 'g');
            const matches = text.match(re);
            if (matches) score += matches.length;
          }

          if (m.name && m.name.toLowerCase().includes(keywords[0])) score += 5;
          if (m.tags && m.tags.some(t => t.toLowerCase().includes(keywords[0]))) score += 3;
          // Exact ID match = high boost
          if (m.id && m.id.toLowerCase().includes(keywords[0])) score += 8;

          return { manifest: m, score };
        });

        return scored
          .filter(s => s.score > 0)
          .sort((a, b) => b.score - a.score)
          .slice(0, 20)
          .map(s => s.manifest);
      }

      function renderResults(results, query) {
        const el = document.getElementById('results');
        showingDetail = null;

        if (!results || results.length === 0) {
          el.innerHTML = `
            <div class="empty-state">
              <div class="icon">🔍</div>
              <h3>未找到匹配的 Skill</h3>
              <p>试试其他关键词，或 <a href="#" id="browseEmpty">浏览全部</a></p>
            </div>
          `;
          document.getElementById('browseEmpty')?.addEventListener('click', e => { e.preventDefault(); loadAll(); });
          return;
        }

        el.innerHTML = results.map(m => {
          const capCount = m.capabilities?.length || 0;
          const isAudited = m.trust?.verified_by?.length > 0;
          const repo = m._repo || m.id?.replace(/\./g, '/') || 'unknown';
          const desc = m.description || '暂无描述';
          const badges = [];
          if (isAudited) badges.push('<span class="badge audited">✓ 已审计</span>');
          else badges.push('<span class="badge unaudited">未审计</span>');
          if ((m.capabilities || []).every(c => !c.cost_per_call)) badges.push('<span class="badge free">免费</span>');

          return `
            <div class="result-card" data-id="${m.id}">
              <div class="top">
                <div>
                  <div class="name">${m.name} <small>v${m.version || '0.1'}</small></div>
                </div>
                <div>${badges.join('')}</div>
              </div>
              <div class="desc">${desc}</div>
              <div class="meta">
                <span class="cap-count">🎯 ${capCount} 个能力</span>
                <span>👤 ${m.author?.name || '匿名'}</span>
                ${m.runtime?.engine ? `<span>⚙ ${m.runtime.engine}</span>` : ''}
                ${m.tags?.length ? `<span>🏷 ${m.tags.slice(0, 3).join(', ')}</span>` : ''}
              </div>
              <span class="install-cmd">agent install ${repo}</span>
            </div>
          `;
        }).join('');

        // Add click handlers
        document.querySelectorAll('.result-card[data-id]').forEach(el => {
          el.addEventListener('click', () => showDetail(el.dataset.id));
        });
      }

      function showDetail(id) {
        const m = index.find(x => x.id === id);
        if (!m) return;
        showingDetail = id;

        const el = document.getElementById('results');
        const repo = m._repo || m.id?.replace(/\./g, '/') || 'unknown';
        const caps = m.capabilities || [];

        el.innerHTML = `
          <div class="detail-header">
            <a href="#" id="backBtn">← 返回搜索结果</a>
          </div>
          <div class="result-card detail-card">
            <div class="top">
              <div>
                <h2>${m.name}</h2>
                <div class="subtitle">${m.id} · v${m.version || '0.1'}</div>
              </div>
            </div>
            <div class="desc-text">${m.description || '暂无描述'}</div>
            <div class="detail-grid">
              <div>👤 作者: ${m.author?.name || '未知'}</div>
              <div>📄 许可: ${m.license || '未声明'}</div>
              <div>⚙ 引擎: ${m.runtime?.engine || '未指定'}</div>
              <div>🔒 沙箱: ${m.trust?.sandbox_level || 'basic'}</div>
            </div>
            <div class="install-cmd" style="margin-top:12px">agent install ${repo}</div>
            <hr>
            <div class="section-title">🎯 能力 (${caps.length})</div>
            ${caps.map(c => `
              <div class="detail-cap">
                <div class="detail-cap-title">${c.name}</div>
                <div class="detail-cap-desc">${c.description || ''}</div>
                ${c.intents?.length ? `<div class="detail-cap-intents">📝 ${c.intents.slice(0, 4).join(' · ')}</div>` : ''}
              </div>
            `).join('')}
            ${m.tags?.length ? `
              <hr>
              <div class="section-title">🏷 标签</div>
              <div class="tag-cloud">
                ${m.tags.map(t => `<span class="tag-item" data-tag="${t}">${t}</span>`).join('')}
              </div>
            ` : ''}
            ${m.trust?.permissions?.length ? `
              <hr>
              <div class="section-title">🔒 权限</div>
              <div style="display:flex;flex-wrap:wrap;gap:6px">
                ${m.trust.permissions.map(p => `<span class="perm-badge">${p}</span>`).join('')}
              </div>
            ` : ''}
          </div>
        `;

        // Back button
        document.getElementById('backBtn').addEventListener('click', e => {
          e.preventDefault();
          const q = document.getElementById('searchInput').value.trim();
          if (q) doSearch(q);
          else loadAll();
        });

        // Tag click handlers
        document.querySelectorAll('.tag-item[data-tag]').forEach(el => {
          el.addEventListener('click', () => {
            document.getElementById('searchInput').value = el.dataset.tag;
            doSearch(el.dataset.tag);
          });
        });
      }

      function doSearch(query) {
        document.getElementById('searchInput').value = query;
        if (!query || !query.trim()) {
          loadAll();
          return;
        }
        const results = localSearch(query.trim());
        renderResults(results, query);
      }

      function loadAll() {
        renderResults(index, '');
      }

      // Search input with debounce
      let timer;
      document.getElementById('searchInput').addEventListener('input', e => {
        clearTimeout(timer);
        timer = setTimeout(() => {
          const q = e.target.value.trim();
          if (q) doSearch(q);
          else loadAll();
        }, 200);
      });

      // Enter key to search
      document.getElementById('searchInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          clearTimeout(timer);
          const q = e.target.value.trim();
          if (q) doSearch(q);
          else loadAll();
        }
      });

      // Browse all link
      document.getElementById('browseAllLink').addEventListener('click', e => {
        e.preventDefault();
        loadAll();
      });

      // Init
      renderStats();
      loadAll();
    })();
  </script>
</body>
</html>
